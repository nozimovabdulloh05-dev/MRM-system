<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>AI Student System</title>

  <link rel="stylesheet" href="style.css">

</head>
<body>

  <div class="login-page">

    <div class="login-box">

      <h1>AI Student System</h1>

      <select id="role">

        <option value="">
          Select Role
        </option>

        <option value="student">
          Student
        </option>

        <option value="teacher">
          Teacher
        </option>

      </select>

      <input
        type="text"
        id="username"
        placeholder="Enter Name"
      >

      <button id="loginBtn">

        Login

      </button>

    </div>

  </div>

  <script src="java.js"></script>

</body>
</html>
